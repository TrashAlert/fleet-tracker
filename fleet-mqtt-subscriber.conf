[program:fleet-mqtt-subscriber]
command=/usr/bin/php /var/www/fleet-tracker/artisan mqtt:subscribe
directory=/var/www/fleet-tracker
autostart=true
autorestart=true
startretries=5
numprocs=1
redirect_stderr=true
stdout_logfile=/var/www/fleet-tracker/storage/logs/mqtt-subscriber.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=5
user=www-data
environment=HOME="/var/www",USER="www-data"
